  </text>

  <line x1="148" y1="132" x2="418" y2="132" stroke="#B5D4F4" stroke-width="0.75" />

  <text
    x="148"
    y="152"
    fill="#185FA5"
    style="font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;"
  >
    RMA
  </text>
  <text
    x="192"
    y="152"
    fill="#D3D1C7"
    style="font-family: monospace; font-size: 13px; font-weight: 400;"
